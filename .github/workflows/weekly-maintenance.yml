name: Weekly Maintenance

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate architecture diagrams
        run: python docs/architecture/generate_diagrams.py

      - name: Run tests
        run: pytest tests/ -v --tb=short || true

      - name: Commit and push any changes
        run: |
          git config --global user.name "Nayan Dhurve"
          git config --global user.email "122363521+Naydhurve3@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly maintenance [skip ci]"
            git push
          fi
